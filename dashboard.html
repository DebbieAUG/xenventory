<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xenventory Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-blue-100 min-h-screen">
    <!-- Header -->
    <header class="bg-white border-b shadow-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-blue-600">
                    Xenventory
                </h1>
                <p class="text-sm text-gray-500">
                    Inventory Management System
                </p>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-gray-700">
                    Welcome,
                    <strong id="loggedUser"></strong>
                </span>
                <button
                    id="logoutBtn"
                    class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg transition">
                    Logout
                </button>
            </div>
        </div>
    </header>
    <!-- Main -->
    <main class="max-w-7xl mx-auto p-6">
        <h2 class="text-3xl font-bold mb-8">
            Dashboard
        </h2>
        <!-- Dashboard Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-sm p-6">
                <p class="text-gray-500 text-sm uppercase">
                    Inventory Items
                </p>
                <h3
                    id="cardInventory"
                    class="text-4xl font-bold mt-3">
                    0
                </h3>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-6">
                <p class="text-gray-500 text-sm uppercase">
                    Available Qty
                </p>
                <h3
                    id="cardAvailable"
                    class="text-4xl font-bold mt-3">
                    0
                </h3>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-6">
                <p class="text-gray-500 text-sm uppercase">
                    Pending Requests
                </p>
                <h3
                    id="cardPending"
                    class="text-4xl font-bold mt-3">
                    0
                </h3>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-6">
                <p class="text-gray-500 text-sm uppercase">
                    Approved Requests
                </p>
                <h3
                    id="cardApproved"
                    class="text-4xl font-bold mt-3">
                    0
                </h3>
            </div>
        </div>
        <!-- Inventory -->
        <div class="bg-white rounded-xl shadow-sm mb-8">
            <div class="flex justify-between items-center p-6 border-b">
                <h2 class="text-xl font-semibold">
                    Inventory
                </h2>
                <button
                    id="showAdd"
                    class="admin-only bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg transition">
                    + Add Item
                </button>
            </div>
            <div
                id="inventorySection"
                class="overflow-x-auto p-6">
            </div>
        </div>
    
        <!-- Request Item -->
        <div class="bg-white rounded-xl shadow-sm mb-8">
            <div class="p-6 border-b">
                <h2 class="text-xl font-semibold">
                    Returns
                </h2>
            </div>
            <div class="p-6">
                <div class="grid md:grid-cols-4 gap-4">
                    <select
                        id="returnRequest"
                        class="border rounded-lg px-4 py-3">
                        <option value="">Select Approved Request</option>
                    </select>
                    <input
                        id="returnQty"
                        type="number"
                        placeholder="Quantity"
                        class="border rounded-lg px-4 py-3">
                    <input
                        id="returnComment"
                        type="text"
                        placeholder="Comment"
                        class="border rounded-lg px-4 py-3">
                    <button
                        id="submitReturn"
                        class="bg-blue-600 hover:bg-blue-700 text-white rounded-lg">
                        Return Item
                    </button>
                </div>
            </div>
            <div
                id="returnsSection"
                class="overflow-x-auto p-6">
            </div>
        </div>

        <!-- Returns -->
        <div
            id="returnsSection"
            class="bg-white rounded-xl shadow-sm mb-8">
            <div class="p-6 border-b">
                <h2 class="text-xl font-semibold">
                    Returns
                </h2>
            </div>
            <div class="p-6">
                <p class="text-gray-400">
                    Return module will appear here.
                </p>
            </div>
        </div>
        <!-- Reports -->
        <div
            id="reportsSection"
            class="bg-white rounded-xl shadow-sm">
            <div class="p-6 border-b">
                <h2 class="text-xl font-semibold">
                    Reports
                </h2>
            </div>
            <div class="p-6 flex flex-wrap gap-4">
                <button
                    id="downloadInventory"
                    class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg">
                    Download Inventory
                </button>
                <button
                    id="downloadRequests"
                    class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg">
                    Download Requests
                </button>
                <button
                    id="downloadReturns"
                    class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg">
                    Download Returns
                </button>
            </div>
        </div>
    </main>
    <!-- Add Inventory Modal -->
    <div
        id="addModal"
        class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-3xl p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">
                    Add Inventory Item
                </h2>
                <button
                    id="closeModal"
                    class="text-3xl font-light hover:text-red-500">
                    ×
                </button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <input
                    id="itemName"
                    type="text"
                    placeholder="Item Name"
                    class="border rounded-lg px-4 py-3">
                <input
                    id="category"
                    type="text"
                    placeholder="Category"
                    class="border rounded-lg px-4 py-3">
                <input
                    id="qty"
                    type="number"
                    placeholder="Available Quantity"
                    class="border rounded-lg px-4 py-3">
                <input
                    id="customer"
                    type="text"
                    placeholder="Customer"
                    class="border rounded-lg px-4 py-3">
                <input
                    id="purchaseDate"
                    type="date"
                    class="border rounded-lg px-4 py-3">
                <input
                    id="cost"
                    type="number"
                    placeholder="Cost Per Unit"
                    class="border rounded-lg px-4 py-3">
                <textarea
                    id="remarks"
                    placeholder="Remarks"
                    rows="4"
                    class="border rounded-lg px-4 py-3 md:col-span-2"></textarea>
            </div>
            <div class="mt-8 flex justify-end gap-3">
                <button
                    id="closeModalSecondary"
                    class="border px-5 py-2 rounded-lg">
                    Cancel
                </button>
                <button
                    id="saveInventory"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg">
                    Save Item
                </button>
            </div>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/inventory.js"></script>
    <script src="js/requests.js"></script>
    <script src="js/returns.js"></script>
    <script src="js/reports.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
