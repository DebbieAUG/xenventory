<body class="bg-slate-100">
    <!-- Header -->
    <header class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-3xl font-bold text-blue-600">
                Xenventory
            </h1>
            <div class="flex items-center gap-5">
                <span>
                    Welcome,
                    <strong id="loggedUser"></strong>
                </span>
                <button
                    id="logoutBtn"
                    class="bg-red-500 text-white px-4 py-2 rounded">
                    Logout
                </button>
            </div>
        </div>
    </header>
    <main class="max-w-7xl mx-auto p-6">
        <!-- Dashboard -->
        <h2 class="text-2xl font-bold mb-6">
            Dashboard
        </h2>
        <!-- Summary Cards -->
        <div class="grid md:grid-cols-4 gap-6 mb-10">
            <div class="bg-white rounded-xl shadow p-5">
                <h3 class="text-gray-500">
                    Inventory Items
                </h3>
                <p
                    id="cardInventory"
                    class="text-4xl font-bold mt-2">
                    0
                </p>
            </div>
            <div class="bg-white rounded-xl shadow p-5">
                <h3 class="text-gray-500">
                    Available Qty
                </h3>
                <p
                    id="cardAvailable"
                    class="text-4xl font-bold mt-2">
                    0
                </p>
            </div>
            <div class="bg-white rounded-xl shadow p-5">
                <h3 class="text-gray-500">
                    Pending Requests
                </h3>
                <p
                    id="cardPending"
                    class="text-4xl font-bold mt-2">
                    0
                </p>
            </div>
            <div class="bg-white rounded-xl shadow p-5">
                <h3 class="text-gray-500">
                    Approved Requests
                </h3>
                <p
                    id="cardApproved"
                    class="text-4xl font-bold mt-2">
                    0
                </p>
            </div>
        </div>
        <!-- Inventory -->
        <div class="bg-white rounded-xl shadow">
            <div class="flex justify-between items-center border-b p-5">
                <h2 class="text-xl font-bold">
                    Inventory
                </h2>
                <button
                    id="showAdd"
                    class="bg-blue-600 text-white px-4 py-2 rounded">
                    + Add Item
                </button>
            </div>
            <div
                id="inventorySection"
                class="overflow-x-auto p-5">
            </div>
        </div>
    </main>
    <!-- Add Inventory Modal -->
    <div id="addModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-lg w-full max-w-2xl p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">
                    Add Inventory
                </h2>
                <button
                    id="closeModal"
                    class="text-2xl font-bold hover:text-red-500">
                    ×
                </button>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <input
                    id="itemName"
                    type="text"
                    placeholder="Item Name"
                    class="border rounded p-2">
                <input
                    id="category"
                    type="text"
                    placeholder="Category"
                    class="border rounded p-2">
                <input
                    id="qty"
                    type="number"
                    placeholder="Available Qty"
                    class="border rounded p-2">
                <input
                    id="customer"
                    type="text"
                    placeholder="Customer"
                    class="border rounded p-2">
                <input
                    id="purchaseDate"
                    type="date"
                    class="border rounded p-2">
                <input
                    id="cost"
                    type="number"
                    placeholder="Cost Per Unit"
                    class="border rounded p-2">
                <textarea
                    id="remarks"
                    placeholder="Remarks"
                    class="border rounded p-2 col-span-2"></textarea>
            </div>
            <div class="mt-6 text-right">
                <button
                    id="saveInventory"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded">
                    Save Item
                </button>
            </div>
        </div>
    </div>
    <!-- Keep the modal you already have -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
</body>
