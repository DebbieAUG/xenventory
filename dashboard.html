<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xenventory Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100">
<div class="p-6">
    <div class="flex justify-between items-center">
        <h1 class="text-3xl font-bold">
            Xenventory Dashboard
        </h1>
        <button
            id="logoutBtn"
            class="bg-red-500 text-white px-4 py-2 rounded">
            Logout
        </button>
    </div>
    <div class="mt-8">
        <button
            id="showInventory"
            class="bg-blue-600 text-white px-4 py-2 rounded">
            Inventory
        </button>
        <button
            id="showAdd"
            class="bg-green-600 text-white px-4 py-2 rounded ml-2">
            Add Item
        </button>
    </div>
    <div
        id="inventorySection"
        class="mt-8">
    </div>
    <!-- Add Inventory Modal -->
    <div id="addModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center">
        <div class="bg-white rounded-xl shadow-lg w-full max-w-2xl p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">
                    Add Inventory
                </h2>
                <button id="closeModal" class="text-2xl">
                    ×
                </button>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <input id="itemName" placeholder="Item Name" class="border p-2 rounded">
                <input id="category" placeholder="Category" class="border p-2 rounded">
                <input id="qty" type="number" placeholder="Available Qty" class="border p-2 rounded">
                <input id="customer" placeholder="Customer" class="border p-2 rounded">
                <input id="purchaseDate" type="date" class="border p-2 rounded">
                <input id="cost" type="number" placeholder="Cost Per Unit" class="border p-2 rounded">
                <textarea
                    id="remarks"
                    placeholder="Remarks"
                    class="border p-2 rounded col-span-2"></textarea>
            </div>
            <div class="mt-6 text-right">
                <button
                    id="saveInventory"
                    class="bg-green-600 text-white px-5 py-2 rounded">
                    Save Item
                </button>
            </div>
        </div>
    </div>
</div>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
